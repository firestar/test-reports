version: 1

# Kaiad pipeline for audit-reports: build the root Dockerfile and deploy
# the resulting image. Kaiad runs `docker build` on the host daemon,
# pushes the image to its built-in registry, and deploys to every bound
# agent.
#
# Adjust as needed:
#   - ports:        the container's listening port(s) (source of truth)
#   - domains:      external host(s) routed to a port (needs an LB type)
#   - loadBalancer: none | metallb | k8s | nginx
#   - environments: per-environment namespace / overrides
# Full reference: https://kaiad.dev/reference/pipeline.html
#
# Persistence: the application writes its SQLite database to
# /data/projman.db. Kaiad mounts a shared persistent volume at /data for
# every container in the cluster, so the file survives pod restarts as
# long as that mount is in place. If you ever deploy this image outside
# kaiad, bind-mount or PVC-mount a persistent volume at /data — the
# Dockerfile already declares VOLUME ["/data"].

dockerfile:
  path: Dockerfile
  context: .

ports:
  - port: 8080
    name: http

instances: 1

loadBalancer:
  type: none

environments:
  development:
    namespace: test-reports-dev
  production:
    namespace: test-reports-prod
