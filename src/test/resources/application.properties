# Application
spring.application.name=audit-reports

# In-memory SQLite for tests (shared cache so the Hikari pool sees one db)
spring.datasource.url=jdbc:sqlite:file::memory:?cache=shared
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=1

# JPA
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# Initialize data after JPA schema creation
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Google Calendar (leave blank to disable)
google.calendar.credentials-path=
google.calendar.application-name=Audit Reports

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
