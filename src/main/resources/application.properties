# Application
spring.application.name=audit-reports

# H2 Database
spring.datasource.url=jdbc:h2:mem:auditdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Initialize data after JPA schema creation
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Google Calendar (leave blank to disable)
google.calendar.credentials-path=
google.calendar.application-name=Audit Reports

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
